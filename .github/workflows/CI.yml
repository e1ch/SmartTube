name: Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING_KEY: ${{ secrets.SIGNING_KEY != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Build Beta Release APKs
        run: ./gradlew assembleStbetaRelease

      - name: Build Stable Release APKs
        run: ./gradlew assembleStstableRelease

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          for abi in armeabi-v7a arm64-v8a x86 universal; do
            cp smarttubetv/build/outputs/apk/stbeta/release/*_${abi}.apk release_assets/SmartTube_beta_${abi}.apk || true
            cp smarttubetv/build/outputs/apk/ststable/release/*_${abi}.apk release_assets/SmartTube_stable_${abi}.apk || true
          done
          ls -la release_assets

      - name: Create Release
        run: |
          gh release delete release --yes || true
          git push origin :refs/tags/release || true
          gh release create release release_assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}