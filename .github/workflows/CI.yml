name: Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING_KEY: ${{ secrets.SIGNING_KEY != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Read Version
        id: version
        shell: bash
        run: |
          VERSION_NAME="$(tr -d '\r\n' < VERSION)"
          if [ -z "$VERSION_NAME" ]; then
            echo "VERSION file is empty"
            exit 1
          fi

          VERSION_TAG="v${VERSION_NAME}"

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

          echo "VERSION_NAME=$VERSION_NAME"
          echo "VERSION_TAG=$VERSION_TAG"

      - name: Configure Build Signing
        if: ${{ env.HAS_SIGNING_KEY == 'true' }}
        shell: bash
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > keystore.properties
          echo "keyAlias=${{ secrets.ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "storeFile=${{ github.workspace }}/key.jks" >> keystore.properties
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > "${{ github.workspace }}/key.jks"

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Build Ash Release APKs
        run: ./gradlew assembleStashRelease

      - name: Build Bridge Release APKs
        run: ./gradlew assembleStbridgeRelease

      - name: Prepare Release Assets
        shell: bash
        run: |
          mkdir -p release_assets

          for abi in armeabi-v7a arm64-v8a x86 universal; do
            cp smarttubetv/build/outputs/apk/stash/release/*_"${abi}".apk "release_assets/SmartTube_ash_${abi}.apk"
            cp smarttubetv/build/outputs/apk/stbridge/release/*_"${abi}".apk "release_assets/SmartTube_bridge_${abi}.apk"
          done

          ls -lah release_assets

      - name: Generate Release Notes
        shell: bash
        run: |
          {
            echo "## ${{ steps.version.outputs.version_tag }}"
            echo
            echo "Source commit: \`${{ github.sha }}\`"
            echo
            echo "### 使用說明 / Which APK do I install?"
            echo
            echo "**SmartTube Ash (org.smarttube.ash)** — 新的長期版本，全新安裝使用者請裝這個。"
            echo "**SmartTube Bridge (org.smarttube.beta)** — 一次性過渡版。**僅供** 現有使用舊 fork（package 為 \`org.smarttube.beta\`）的人使用。安裝後打開會顯示遷移提示，引導你下載 Ash 版。Ash 裝好後可以手動解除安裝這個 bridge。"
            echo
            echo "### Assets"
            echo "- SmartTube_ash_armeabi-v7a.apk"
            echo "- SmartTube_ash_arm64-v8a.apk"
            echo "- SmartTube_ash_x86.apk"
            echo "- SmartTube_ash_universal.apk"
            echo "- SmartTube_bridge_armeabi-v7a.apk"
            echo "- SmartTube_bridge_arm64-v8a.apk"
            echo "- SmartTube_bridge_x86.apk"
            echo "- SmartTube_bridge_universal.apk"
            echo
            echo "### Recent commits"
            git log --pretty='- %s' -n 12
          } > release_notes.txt

      - name: Delete old moving release tag
        shell: bash
        run: |
          gh release delete release --yes --cleanup-tag || true
          git push origin :refs/tags/release || true
          git tag -d release || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing version tag release if exists
        shell: bash
        run: |
          gh release delete "${{ steps.version.outputs.version_tag }}" --yes --cleanup-tag || true
          git push origin ":refs/tags/${{ steps.version.outputs.version_tag }}" || true
          git tag -d "${{ steps.version.outputs.version_tag }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create immutable version tag release
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.version_tag }}" \
            release_assets/* \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.version_tag }}" \
            --notes-file release_notes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create moving release tag
        shell: bash
        run: |
          gh release create release \
            release_assets/* \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.version_tag }}" \
            --notes-file release_notes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartTube_${{ steps.version.outputs.version_tag }}
          path: release_assets/*.apk
          if-no-files-found: error
          retention-days: 7
