name: Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING_KEY: ${{ secrets.SIGNING_KEY != '' }}
      HAS_VT_KEY: ${{ secrets.VIRUS_TOTAL_API_KEY != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Get Version Info
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName" smarttubetv/build.gradle | head -n 1 | awk -F'"' '{print $2}')
          VERSION_CODE=$(grep "versionCode" smarttubetv/build.gradle | head -n 1 | awk '{print $2}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Configure Build Signing
        if: ${{ env.HAS_SIGNING_KEY == 'true' }}
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > keystore.properties
          echo "keyAlias=${{ secrets.ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "storeFile=${{ github.workspace }}/key.jks" >> keystore.properties
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > ${{ github.workspace }}/key.jks

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Build Beta APKs
        run: ./gradlew assembleStbetaDebug

      - name: Build Stable APKs
        run: ./gradlew assembleStstableDebug

      - name: Prepare Release Assets
        id: prepare
        run: |
          mkdir -p release_assets
          # Beta APKs (rename to remove version for stable download URLs)
          for abi in armeabi-v7a arm64-v8a x86 universal; do
            cp smarttubetv/build/outputs/apk/stbeta/debug/*_${abi}.apk release_assets/SmartTube_beta_${abi}.apk
            cp smarttubetv/build/outputs/apk/ststable/debug/*_${abi}.apk release_assets/SmartTube_stable_${abi}.apk
          done
          ls -la release_assets/

      - name: Delete Old Release
        run: |
          gh release delete release --yes 2>/dev/null || true
          git push origin :refs/tags/release 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: |
          gh release create release \
            --title "v${{ steps.get_version.outputs.VERSION_NAME }}" \
            --notes "## v${{ steps.get_version.outputs.VERSION_NAME }} (build ${{ github.run_number }})

          Auto-built from commit ${{ github.sha }}

          ### Download
          | Variant | ABI | Link |
          |---------|-----|------|
          | Beta | armeabi-v7a | [Download](https://github.com/${{ github.repository }}/releases/download/release/SmartTube_beta_armeabi-v7a.apk) |
          | Beta | arm64-v8a | [Download](https://github.com/${{ github.repository }}/releases/download/release/SmartTube_beta_arm64-v8a.apk) |
          | Beta | universal | [Download](https://github.com/${{ github.repository }}/releases/download/release/SmartTube_beta_universal.apk) |
          | Stable | armeabi-v7a | [Download](https://github.com/${{ github.repository }}/releases/download/release/SmartTube_stable_armeabi-v7a.apk) |
          " \
            release_assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (backup)
        uses: actions/upload-artifact@v7
        with:
          name: SmartTube_v${{ steps.get_version.outputs.VERSION_NAME }}
          path: release_assets/*.apk
          if-no-files-found: error
